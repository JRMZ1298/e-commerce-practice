name: Build and Deploy

on:
  push:
    branches: [main]

env:
  DOCKER_IMAGE_BACKEND: ${{ secrets.DOCKER_REGISTRY }}/ecommerce-backend
  DOCKER_IMAGE_FRONTEND: ${{ secrets.DOCKER_REGISTRY }}/ecommerce-frontend

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
      redis:
        image: redis:7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: mvn verify
        working-directory: ./backend

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci && npm test
        working-directory: ./frontend

  e2e-tests:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: ./frontend
      - name: Run E2E tests
        run: npx playwright test
        working-directory: ./frontend

  security-scan:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run OWASP ZAP scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: ${{ secrets.STAGING_URL || 'https://staging.dominio.com' }}
          rules_file_name: '.zap/rules.conf'
          cmd_options: '-a -j'

  build-and-push:
    needs: [e2e-tests, security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.DOCKER_IMAGE_BACKEND }}:${{ github.sha }},${{ env.DOCKER_IMAGE_BACKEND }}:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.DOCKER_IMAGE_FRONTEND }}:${{ github.sha }},${{ env.DOCKER_IMAGE_FRONTEND }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.dominio.com/v1
            NEXT_PUBLIC_STRIPE_KEY=${{ secrets.STRIPE_PUBLIC_KEY }}

  deploy:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/ecommerce
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
