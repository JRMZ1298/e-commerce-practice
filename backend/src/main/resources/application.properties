spring.application.name=ecommerce-backend

# DB
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ecommerce}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.password=${REDIS_PASSWORD:}

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-expiration=900000
jwt.refresh-expiration=2592000000

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}

# AWS S3
aws.s3.bucket=${S3_BUCKET:ecommerce-assets}
aws.s3.region=${AWS_REGION:us-east-1}
aws.cloudfront.domain=${CDN_DOMAIN}

# Email
email.from=noreply@dominio.com
resend.api-key=${RESEND_API_KEY}

# App
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# Actuator
management.endpoints.web.exposure.include=health,metrics,info
